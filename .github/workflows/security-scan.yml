name: Security Scan

# private repo でも動く構成（GitHub Advanced Security 不要）。
# 依存脆弱性は Dependabot（.github/dependabot.yml）が担当。
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 18 * * 1" # 毎週月曜 JST 3:00 に定期フルスキャン

permissions:
  contents: read

jobs:
  # 秘密情報スキャン（検出したら fail = マージ阻止）。
  # gitleaks-action は org だと有料ライセンス必須のため、無料の CLI(docker) を直実行。
  # 偽物フィクスチャは .gitleaks.toml の allowlist で除外。
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: gitleaks (free CLI via docker)
        run: |
          docker run --rm -v "$PWD:/repo" -w /repo ghcr.io/gitleaks/gitleaks:latest \
            detect --no-git --source=. --config=.gitleaks.toml --redact --verbose

  # SAST（注入 / XSS / SSRF 等）。初期は非ブロッキングで可視化 → 棚卸し後に --error でゲート化。
  semgrep:
    runs-on: ubuntu-latest
    continue-on-error: true
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep scan
        run: |
          semgrep scan \
            --config p/typescript \
            --config p/javascript \
            --config p/security-audit \
            --config p/secrets \
            --exclude 'packages/*/*.test.ts' \
            --sarif --output semgrep.sarif \
            --text
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          if-no-files-found: ignore
