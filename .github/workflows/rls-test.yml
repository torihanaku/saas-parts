name: RLS Isolation

# sql-templates のテナント分離ポリシー(USING+WITH CHECK)が越境SELECT/INSERT/UPDATEを
# 実際に止めるかを、実 Postgres で検証する。PR#8 で塞いだ 003 のポリシー欠落の回帰固定。
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  rls:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: postgres
    steps:
      - uses: actions/checkout@v4
      - name: Ensure psql client
        run: psql --version || (sudo apt-get update && sudo apt-get install -y postgresql-client)
      - name: Run RLS isolation test
        run: bash scripts/run-rls-test.sh
