name: CodeQL

# CodeQL のデータフロー/taint 解析は SQL/NoSQL 注入・XSS・SSRF に強い。
# リポを public 化したので code scanning(Security タブ)が無料で使える。
on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 18 * * 1" # 毎週月曜 JST 3:00

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-extended
      - uses: github/codeql-action/analyze@v4
